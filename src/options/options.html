<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ghostwriter Settings</title>
    <style>
        body {
            margin: 0;
            background: #f7f8fa;
            color: #202124;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        .container {
            max-width: 720px;
            margin: 24px auto;
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 12px;
            padding: 18px;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 13px;
            margin: 10px 0 6px;
        }

        input,
        textarea,
        select,
        button {
            font: inherit;
        }

        input,
        textarea,
        select {
            width: 100%;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            box-sizing: border-box;
            padding: 10px;
        }

        textarea {
            min-height: 140px;
            resize: vertical;
        }

        .actions {
            margin-top: 14px;
            display: flex;
            gap: 10px;
        }

        button {
            border: 1px solid #0a66c2;
            background: #0a66c2;
            color: white;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
        }

        button.secondary {
            background: #fff;
            color: #0a66c2;
        }

        #status {
            margin-top: 12px;
            min-height: 18px;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <main class="container">
        <h1>Settings</h1>

        <label for="apiKey">OpenAI API Key</label>
        <input id="apiKey" type="password" autocomplete="off" placeholder="sk-..." />

        <label for="myVoice">My Voice Profile</label>
        <textarea id="myVoice" placeholder="Describe your tone, style, and point of view."></textarea>

        <label for="defaultMode">Default Thought Leadership Mode</label>
        <select id="defaultMode">
            <option>Builder</option>
            <option>Strategist</option>
            <option>Operator</option>
            <option>Contrarian</option>
            <option>Teacher</option>
            <option>Curious Connector</option>
        </select>

        <div class="actions">
            <button id="saveBtn">Save Settings</button>
            <button id="clearApiKeyBtn" class="secondary">Clear API Key</button>
        </div>
    </main>

    <script src="options.js" type="module"></script>
</body>

</html>
